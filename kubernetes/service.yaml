# ============================================================================
# Kubernetes Service: Fraud Detection API
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api-svc
  namespace: default
  labels:
    app: fraud-detection-api
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /health
spec:
  type: LoadBalancer
  selector:
    app: fraud-detection-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 8000
      protocol: TCP
  sessionAffinity: None
