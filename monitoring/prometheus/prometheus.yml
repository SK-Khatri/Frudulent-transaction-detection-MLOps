# ============================================================================
# Prometheus Configuration for Fraud Detection Monitoring
# ============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: fraud-detection-aks
    environment: production

# ─── Alerting Rules ────────────────────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ─── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ─── Scrape Configs ────────────────────────────────────────────────────────────
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Fraud Detection API
  - job_name: "fraud-detection-api"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["fraud-detection-api:8000"]
        labels:
          service: fraud-detection
          environment: production

    # For Kubernetes service discovery (when deployed on AKS)
    # Uncomment below and comment out static_configs above
    # kubernetes_sd_configs:
    #   - role: pod
    # relabel_configs:
    #   - source_labels: [__meta_kubernetes_pod_label_app]
    #     action: keep
    #     regex: fraud-detection-api
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
    #     action: replace
    #     target_label: __address__
    #     regex: (.+)
    #     replacement: $1

  # Node Exporter (infrastructure metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
